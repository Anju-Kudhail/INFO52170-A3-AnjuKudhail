name: CI - Anju Kudhail

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Display welcome message
        run: echo " Hello Anju , file has been modified"

      - name: Run app.py
        run: python app.py
        